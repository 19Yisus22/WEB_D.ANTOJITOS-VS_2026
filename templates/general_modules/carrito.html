<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Panel Mi Carrito | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/general_modules/style_carrito.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_utils.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_design_system.css') }}">
</head>
<body>
    {% include 'global_modules/navbar.html' %}
    <div class="page-wrapper">
    <main class="container py-4 py-md-5">

        <section class="mb-5" data-reveal>
            <header class="section-header text-center mb-4 mb-md-5">
                <h2 class="display-6 fw-bold" data-i18n="cart.title">Mi Carrito</h2>
                <div class="divider mx-auto"></div>
                <p class="text-muted px-3" data-i18n="cart.subtitle">Aquí visualizará todos los productos que seleccionó del catálogo.</p>
            </header>

            <section id="carritoContainer" class="mb-5 shadow-sm rounded-4 overflow-hidden bg-white" data-reveal></section>

            <div class="text-center mb-5">
                <button class="btn btn-lg btn-confirmar ds-ripple px-4 px-md-5 py-3 shadow w-100 w-md-auto" id="btnFinalizarCompra">
                    <i class="bi bi-send-check me-2"></i><span data-i18n="cart.order">Enviar Pedido Ahora</span>
                </button>
            </div>
        </section>

    </main>
    </div><!-- /page-wrapper -->

    <div id="toastContainer"></div>
    {% include 'global_modules/footer.html' %}
    <button id="scrollToTopBtn" title="Volver arriba"><i class="bi bi-arrow-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/global_js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/general_js/carrito.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/compiled/design-system.js') }}" defer></script>
</body>
</html>
