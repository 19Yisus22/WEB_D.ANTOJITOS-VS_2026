<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Muro de Sugerencias | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/general_modules/style_comentarios.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_utils.css') }}">
</head>
<body>
    {% include 'global_modules/navbar.html' %}
    <main class="page-wrapper d-flex align-items-center justify-content-center py-2 py-md-4">
        <div class="container-fluid px-2 px-md-4">
            <div class="chat-container mx-auto">
                <header class="chat-header p-3 d-flex align-items-center justify-content-between shadow-sm">
                    <h5 class="mb-0 d-flex align-items-center text-white">
                        <i class="bi bi-chat-heart-fill me-3"></i>
                        <span>Muro de Sugerencias</span>
                    </h5>
                    <div class="header-status d-flex align-items-center bg-white bg-opacity-25 px-3 py-1 rounded-pill">
                        <small id="statusCounter" class="fw-bold text-white">
                            <i class="bi bi-people-fill me-1"></i> Cargando...
                        </small>
                    </div>
                </header>
                
                <div id="chatBox" class="p-3 p-md-4"></div>
                
                <div class="chat-input-area p-3 border-top bg-white">
                    <div class="toolbar d-flex align-items-center gap-2 mb-2 flex-wrap">
                        <!-- Botón emoji colapsable -->
                        <div class="position-relative">
                            <button type="button" class="btn btn-sm btn-light border rounded-pill px-3 py-1" id="btnToggleEmojis" onclick="toggleEmojiPanel()">
                                🎂 <small class="fw-bold ms-1" style="font-size:0.7rem;">Emojis</small>
                            </button>
                            <div id="emojiPanel" class="emoji-panel-container" style="display:none;">
                                <div class="emoji-panel-grid">
                                    <span class="emoji-item" onclick="insertEmoji('😊')">😊</span>
                                    <span class="emoji-item" onclick="insertEmoji('😂')">😂</span>
                                    <span class="emoji-item" onclick="insertEmoji('😍')">😍</span>
                                    <span class="emoji-item" onclick="insertEmoji('🙌')">🙌</span>
                                    <span class="emoji-item" onclick="insertEmoji('👍')">👍</span>
                                    <span class="emoji-item" onclick="insertEmoji('🔥')">🔥</span>
                                    <span class="emoji-item" onclick="insertEmoji('🍰')">🍰</span>
                                    <span class="emoji-item" onclick="insertEmoji('✨')">✨</span>
                                    <span class="emoji-item" onclick="insertEmoji('🍫')">🍫</span>
                                    <span class="emoji-item" onclick="insertEmoji('🍭')">🍭</span>
                                    <span class="emoji-item" onclick="insertEmoji('🧁')">🧁</span>
                                    <span class="emoji-item" onclick="insertEmoji('🎂')">🎂</span>
                                    <span class="emoji-item" onclick="insertEmoji('❤️')">❤️</span>
                                    <span class="emoji-item" onclick="insertEmoji('😋')">😋</span>
                                    <span class="emoji-item" onclick="insertEmoji('🤤')">🤤</span>
                                    <span class="emoji-item" onclick="insertEmoji('😎')">😎</span>
                                </div>
                            </div>
                        </div>
                        <!-- Formato texto -->
                        <button type="button" class="btn btn-sm btn-light border rounded-pill px-2" title="Negrita" onclick="insertFormat('**','**')"><i class="bi bi-type-bold"></i></button>
                        <button type="button" class="btn btn-sm btn-light border rounded-pill px-2" title="Cursiva" onclick="insertFormat('_','_')"><i class="bi bi-type-italic"></i></button>
                        <button type="button" class="btn btn-sm btn-light border rounded-pill px-2" title="Subrayado" onclick="insertFormat('<u>','</u>')"><i class="bi bi-type-underline"></i></button>
                        <button type="button" class="btn btn-sm btn-light border rounded-pill px-2" title="Lista" onclick="insertFormat('\n• ','')"><i class="bi bi-list-ul"></i></button>
                    </div>

                    <div class="input-wrapper d-flex flex-column gap-3">
                        <textarea id="mensajeInput"
                                  class="form-control shadow-none"
                                  rows="2"
                                  placeholder="Escribe tu sugerencia aquí..."></textarea>

                        <div class="d-flex flex-column align-items-center">
                            <button id="sendBtn" class="btn btn-primary fw-bold px-5 py-2 shadow-sm d-flex align-items-center justify-content-center">
                                <span>Enviar Sugerencia</span>
                                <i class="bi bi-send-fill ms-2"></i>
                            </button>
                            <p class="text-muted mb-0 mt-2 d-none d-md-block" style="font-size: 0.8rem;">
                                Déjanos saber lo que piensas, ayúdanos con tu sugerencia.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer"></div>
    {% include 'global_modules/footer.html' %}
    <button id="scrollToTopBtn" title="Volver arriba"><i class="bi bi-arrow-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>const USER_CONFIG = {userId: String("{{ user_id or '' }}"), isLogged: {{ 'true' if session.get('user_id') else 'false' }}};</script>
    <script src="{{ url_for('static', filename='js/global_js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/general_js/comentarios.js') }}"></script>
</body>
</html>
