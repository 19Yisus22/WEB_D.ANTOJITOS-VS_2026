<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Panel Catálogo | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/compiled/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/general_modules/style_catalogo.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_utils.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_design_system.css') }}">
</head>
<body>
    {% include 'global_modules/navbar.html' %}


    <main class="main-content page-wrapper">
        <div class="container pb-4 pb-md-5">

            <header class="catalog-header text-center mb-4 mb-md-5 fade-in" data-reveal>
                <h1 class="display-5 fw-bold mb-2"
                    id="catalogo-titulo"
                    data-config-key="catalogo_titulo">Catálogo de Productos</h1>
                <div class="divider mx-auto mb-3"></div>
                <p class="text-muted px-3"
                   id="catalogo-subtitulo"
                   data-config-key="catalogo_subtitulo">Explora los mejores sabores que tenemos preparados para ti</p>
            </header>

            <section class="search-filter-wrapper mb-4 mb-md-5">
                <div class="row g-2 justify-content-center">
                    <div class="col-12 col-md-7">
                        <div class="input-group search-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search" style="color:var(--primary-color);"></i>
                            </span>
                            <input type="text" id="searchInput"
                                   class="form-control border-start-0 py-2 py-md-3"
                                   data-i18n-placeholder="cat.search"
                                   placeholder="¿Qué se te antoja hoy?">
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <button class="btn btn-dark w-100 h-100 btn-filter shadow-sm py-2" id="btnFiltrar">
                            <i class="bi bi-funnel me-2"></i><span id="btnFiltrarLabel" data-i18n="cat.recent">Recientes</span>
                        </button>
                    </div>
                </div>
            </section>

            <section class="products-section" data-reveal>
                <div class="row mb-3">
                    <div class="col-12">
                        <div class="d-flex flex-column align-items-center text-center">
                            <h2 class="fw-bold h6 text-uppercase m-0"
                                style="letter-spacing:1.5px;color:var(--dark-bg);"
                                id="catalogo-seccion-titulo"
                                data-config-key="catalogo_seccion_titulo"
                                data-i18n="cat.section">Nuestros Postres</h2>
                            <div class="divider mt-2" style="width:35px;height:3px;"></div>
                        </div>
                    </div>
                </div>

                <div id="spinner" class="py-5 text-center">
                    <div class="spinner-grow" style="color:var(--primary-color);width:3rem;height:3rem;" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                </div>

                <div class="row g-2 g-md-4 d-none justify-content-center" id="catalogoProductos" data-reveal></div>
            </section>
        </div>
    </main>

    <button id="btnCarrito" class="shadow-lg" aria-label="Ver Carrito">
        <i class="bi bi-cart3"></i>
        <span id="contadorCarritoBadge" class="badge rounded-pill bg-danger" style="display:none;" data-counter="0">0</span>
    </button>

    <div id="toastContainer"></div>
    {% include 'global_modules/footer.html' %}
    <button id="scrollToTopBtn" title="Volver arriba"><i class="bi bi-arrow-up"></i></button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.userLogged = {{ 'true' if session.get('user') else 'false' }};
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="{{ url_for('static', filename='js/global_js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global_js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global_js/widget_system.js') }}"></script>
    <script src="{{ url_for('static', filename='js/general_js/catalogo.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/compiled/design-system.js') }}" defer></script>
    <script type="module" src="{{ url_for('static', filename='js/compiled/theme.js') }}" defer></script>
</body>
</html>
