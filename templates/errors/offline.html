<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="/static/uploads/logo.ico">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#d35400;
            --primary-light:#e67e22;
            --bg:#fff8f0;
            --dark:#1a1a2e;
            --card:#ffffff;
            --sugg-hover:#fff0e5;
            --input-bg:#f9f3ec;
            --path-bg:#f5f5f5;
            --path-col:#aaa;
            --border-col:#eee;
        }
        [data-theme="dark"]{
            --bg:#111118;
            --card:#1e1e2e;
            --dark:#f0f0f0;
            --sugg-hover:#2a2a3e;
            --input-bg:#181824;
            --path-bg:#2a2a3e;
            --path-col:#888;
            --border-col:#2e2e42;
        }
        html,body{height:100%;overflow:hidden}
        body{
            font-family:'Segoe UI',system-ui,sans-serif;
            background:var(--bg);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            min-height:100vh;position:relative;overflow:hidden;
            -webkit-tap-highlight-color:transparent;
        }
        .particle{
            position:fixed;font-size:1.8rem;
            animation:floatUp linear infinite;
            opacity:0;pointer-events:none;user-select:none;will-change:transform;
        }
        @keyframes floatUp{
            0%  {transform:translateY(110vh) rotate(0deg);opacity:0}
            10% {opacity:.7}
            90% {opacity:.6}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
        }
        .error-card{
            background:var(--card);border-radius:28px;
            padding:2.5rem 2rem;max-width:520px;width:90%;
            text-align:center;box-shadow:0 30px 80px rgba(211,84,0,.15);
            position:relative;z-index:10;
            animation:cardIn .6s cubic-bezier(.175,.885,.32,1.275) both;
            max-height:90vh;overflow-y:auto;scrollbar-width:none;
        }
        .error-card::-webkit-scrollbar{display:none}
        @keyframes cardIn{
            from{transform:scale(.7) translateY(40px);opacity:0}
            to  {transform:scale(1) translateY(0);opacity:1}
        }
        .error-number{
            font-size:clamp(5rem,20vw,8rem);font-weight:900;line-height:1;
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            animation:pulseNum 2.4s ease-in-out infinite;display:block;
        }
        @keyframes pulseNum{
            0%,100%{filter:brightness(1)}
            50%    {filter:brightness(1.25)}
        }
        .error-emoji{
            font-size:3.5rem;display:block;margin:.5rem 0;
            animation:wobble 1.8s ease-in-out infinite;
        }
        @keyframes wobble{
            0%,100%{transform:rotate(-8deg)}
            50%    {transform:rotate(8deg)}
        }
        .error-emoji.sin-internet{animation:ring 1.4s ease-in-out infinite}
        @keyframes ring{
            0%  {transform:rotate(0)}
            10% {transform:rotate(14deg)}
            20% {transform:rotate(-10deg)}
            30% {transform:rotate(14deg)}
            40% {transform:rotate(-6deg)}
            50% {transform:rotate(10deg)}
            60%,100%{transform:rotate(0)}
        }
        .error-title{font-size:1.5rem;font-weight:700;color:var(--dark);margin:.75rem 0 .4rem}
        .error-desc{color:#888;font-size:.95rem;line-height:1.6;margin-bottom:1.4rem}
        .btn-group{
            display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-top:.2rem;
        }
        .btn{
            display:inline-flex;align-items:center;gap:.45rem;
            padding:.65rem 1.4rem;border-radius:50px;
            font-weight:600;font-size:.9rem;
            text-decoration:none;border:none;cursor:pointer;
            transition:transform .18s,box-shadow .18s,background .18s;
            -webkit-tap-highlight-color:transparent;
        }
        .btn:active{transform:scale(.96)!important}
        .btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 18px rgba(211,84,0,.35)}
        .btn-primary:hover{background:var(--primary-light);box-shadow:0 6px 24px rgba(211,84,0,.45);transform:translateY(-2px)}
        .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
        .btn-outline:hover{background:var(--primary);color:#fff;transform:translateY(-2px)}
        .error-path{
            font-size:.75rem;color:var(--path-col);font-family:monospace;
            background:var(--path-bg);border-radius:8px;
            padding:.35rem .7rem;display:inline-block;margin-top:1rem;word-break:break-all;
        }
        .dot{
            position:fixed;width:10px;height:10px;border-radius:50%;
            animation:dotFall linear infinite;pointer-events:none;opacity:.7;will-change:transform;
        }
        @keyframes dotFall{
            0% {transform:translateY(-20px) rotate(0deg);opacity:1}
            100%{transform:translateY(110vh) rotate(720deg);opacity:0}
        }
        @media(max-width:480px){
            .error-card{padding:2rem 1.4rem;border-radius:20px}
            .error-title{font-size:1.25rem}
            .btn{padding:.58rem 1.1rem;font-size:.85rem}
        }
        @media(prefers-reduced-motion:reduce){
            .particle,.dot{animation:none!important;opacity:0!important}
            .error-number,.error-emoji{animation:none!important}
            .error-card{animation:none!important}
        }
    </style>
</head>
<body>
    <div class="error-card">
        <span class="error-number" id="errCodigo">!</span>
        <span class="error-emoji sin-internet" id="errEmoji">📡</span>
        <h1 class="error-title" id="errTitulo">Cargando…</h1>
        <p class="error-desc" id="errDesc"></p>
        <div class="btn-group" id="btnGroup"></div>
        <div class="error-path" id="errPath"></div>
    </div>

    <script>
    (function(){
        const TIPOS = {
            offline: {
                codigo:'!',emoji:'📡',claseEmoji:'sin-internet',
                titulo:'Sin conexión a internet',
                desc:'No se detecta conexión a internet.<br>Revisá tu red Wi-Fi o datos móviles e intentá de nuevo.',
                botones:[
                    {label:'Reintentar',fn:"location.reload()",primary:true},
                ]
            },
            server: {
                codigo:'!',emoji:'⚙️',claseEmoji:'',
                titulo:'Servidor no disponible',
                desc:'El servidor no está respondiendo en este momento.<br>Puede ser una interrupción temporal. Intentá de nuevo en unos momentos.',
                botones:[
                    {label:'Reintentar',fn:"location.reload()",primary:true},
                    {label:'Inicio',fn:"irA('/inicio')",primary:false},
                ]
            },
            404: {
                codigo:'404',emoji:'🍩',claseEmoji:'',
                titulo:'¡Ups! Página no encontrada',
                desc:'Al parecer esta página se la comieron los postres.<br>La ruta que buscas no existe o fue movida.',
                botones:[
                    {label:'Inicio',fn:"irA('/inicio')",primary:true},
                    {label:'Catálogo',fn:"irA('/catalogo_page')",primary:false},
                    {label:'Volver',fn:"history.back()",primary:false},
                ]
            },
            403: {
                codigo:'403',emoji:'🔒',claseEmoji:'',
                titulo:'Acceso denegado',
                desc:'No tenés permiso para ver esta sección.<br>Iniciá sesión con una cuenta autorizada.',
                botones:[
                    {label:'Inicio',fn:"irA('/inicio')",primary:true},
                    {label:'Iniciar sesión',fn:"irA('/login')",primary:false},
                ]
            },
            500: {
                codigo:'500',emoji:'⚙️',claseEmoji:'',
                titulo:'Error interno del servidor',
                desc:'Algo falló en el servidor.<br>Intentalo de nuevo en unos momentos.',
                botones:[
                    {label:'Reintentar',fn:"location.reload()",primary:true},
                    {label:'Inicio',fn:"irA('/inicio')",primary:false},
                ]
            },
            401: {
                codigo:'401',emoji:'🔑',claseEmoji:'',
                titulo:'Sesión expirada',
                desc:'Tu sesión ha expirado o no tenés autorización para ver este contenido.<br>Volvé a iniciar sesión para continuar.',
                botones:[
                    {label:'Iniciar sesión',fn:"irA('/login')",primary:true},
                    {label:'Inicio',fn:"irA('/inicio')",primary:false},
                ]
            },
        };

        function aplicarTipo(clave) {
            const t = TIPOS[clave] || TIPOS['offline'];
            document.getElementById('errCodigo').textContent = t.codigo;
            const em = document.getElementById('errEmoji');
            em.textContent = t.emoji;
            em.className = 'error-emoji' + (t.claseEmoji ? ' ' + t.claseEmoji : '');
            document.getElementById('errTitulo').textContent = t.titulo;
            document.getElementById('errDesc').innerHTML = t.desc;
            document.getElementById('btnGroup').innerHTML = t.botones.map(b =>
                `<button class="btn ${b.primary ? 'btn-primary' : 'btn-outline'}" onclick="${b.fn}">${b.label}</button>`
            ).join('');
        }

        function detectarTipo() {
            const params = new URLSearchParams(location.search);
            const tipo = params.get('tipo');
            if (tipo && TIPOS[tipo]) return tipo;
            if (!navigator.onLine) return 'offline';
            return 'server';
        }

        const tipo = detectarTipo();
        aplicarTipo(tipo);

        const p = document.getElementById('errPath');
        const ruta = location.pathname === '/offline' ? '' : location.pathname;
        if (p && ruta) p.textContent = '📍 ' + ruta;
        else if (p) p.style.display = 'none';

        const th = localStorage.getItem('dantojitos_theme') || 'light';
        document.documentElement.setAttribute('data-theme', th);

        window.addEventListener('online',  () => aplicarTipo(new URLSearchParams(location.search).get('tipo') || 'server'));
        window.addEventListener('offline', () => aplicarTipo('offline'));

        window.irA = function(url) { window.location.href = url; };

        const foods = ['🍩','🧁','🍰','🍫','🍪','🍭','🍬','🍮','🎂','🥐','🍓','🍑'];
        for (let i = 0; i < 12; i++) {
            const el = document.createElement('div');
            el.className = 'particle';
            el.textContent = foods[i % foods.length];
            el.style.cssText = `left:${Math.random()*100}vw;animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*8}s;font-size:${1.2+Math.random()*1.5}rem`;
            document.body.appendChild(el);
        }
        const colors = ['#d35400','#e67e22','#f39c12','#27ae60','#3498db','#9b59b6','#e74c3c'];
        for (let i = 0; i < 18; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            const sz = (6 + Math.random() * 10) + 'px';
            d.style.cssText = `left:${Math.random()*100}vw;background:${colors[i%colors.length]};width:${sz};height:${sz};animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*10}s`;
            document.body.appendChild(d);
        }
    })();
    </script>
</body>
</html>
