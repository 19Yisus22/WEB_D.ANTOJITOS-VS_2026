<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="/static/uploads/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --primary:#d35400;
            --primary-light:#e67e22;
            --bg:#fff8f0;
            --dark:#1a1a2e;
            --card:#ffffff;
            --sugg-hover:#fff0e5;
            --input-bg:#f9f3ec;
            --path-bg:#f5f5f5;
            --path-col:#aaa;
            --border-col:#eee;
        }
        [data-theme="dark"]{
            --bg:#111118;
            --card:#1e1e2e;
            --dark:#f0f0f0;
            --sugg-hover:#2a2a3e;
            --input-bg:#181824;
            --path-bg:#2a2a3e;
            --path-col:#888;
            --border-col:#2e2e42;
        }
        html,body{height:100%;overflow:hidden}
        body{
            font-family:'Segoe UI',system-ui,sans-serif;
            background:var(--bg);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            min-height:100vh;
            position:relative;
            overflow:hidden;
            -webkit-tap-highlight-color:transparent;
        }

        .particle{
            position:fixed;font-size:1.8rem;
            animation:floatUp linear infinite;
            opacity:0;pointer-events:none;user-select:none;
            will-change:transform;
        }
        @keyframes floatUp{
            0%  {transform:translateY(110vh) rotate(0deg);opacity:0}
            10% {opacity:.7}
            90% {opacity:.6}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
        }

        .error-card{
            background:var(--card);
            border-radius:28px;
            padding:2.5rem 2rem;
            max-width:520px;
            width:90%;
            text-align:center;
            box-shadow:0 30px 80px rgba(211,84,0,.15);
            position:relative;
            z-index:10;
            animation:cardIn .6s cubic-bezier(.175,.885,.32,1.275) both;
            max-height:90vh;
            overflow-y:auto;
            scrollbar-width:none;
        }
        .error-card::-webkit-scrollbar{display:none}
        @keyframes cardIn{
            from{transform:scale(.7) translateY(40px);opacity:0}
            to  {transform:scale(1) translateY(0);opacity:1}
        }

        .error-number{
            font-size:clamp(5rem,20vw,8rem);
            font-weight:900;
            line-height:1;
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            animation:pulseNum 2.4s ease-in-out infinite;
            display:block;
        }
        @keyframes pulseNum{
            0%,100%{filter:brightness(1)}
            50%    {filter:brightness(1.25)}
        }

        .error-emoji{
            font-size:3.5rem;
            display:block;
            margin:.5rem 0;
            animation:wobble 1.8s ease-in-out infinite;
        }
        @keyframes wobble{
            0%,100%{transform:rotate(-8deg)}
            50%    {transform:rotate(8deg)}
        }
        .error-emoji.sin-internet{
            animation:ring 1.4s ease-in-out infinite;
        }
        @keyframes ring{
            0%  {transform:rotate(0)}
            10% {transform:rotate(14deg)}
            20% {transform:rotate(-10deg)}
            30% {transform:rotate(14deg)}
            40% {transform:rotate(-6deg)}
            50% {transform:rotate(10deg)}
            60%,100%{transform:rotate(0)}
        }

        .error-title{font-size:1.5rem;font-weight:700;color:var(--dark);margin:.75rem 0 .4rem}
        .error-desc{color:#888;font-size:.95rem;line-height:1.6;margin-bottom:1.4rem}

        .offline-banner{
            display:none;
            background:linear-gradient(135deg,#c0392b,#e74c3c);
            color:#fff;border-radius:12px;
            padding:.6rem 1rem;font-size:.85rem;
            margin-bottom:1rem;align-items:center;gap:.5rem;
            animation:cardIn .35s ease both;
        }
        .offline-banner.visible{display:flex;justify-content:center}

        .btn-group{
            display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;
            margin-top:.2rem;
        }
        .btn{
            display:inline-flex;align-items:center;gap:.45rem;
            padding:.65rem 1.4rem;border-radius:50px;
            font-weight:600;font-size:.9rem;
            text-decoration:none;border:none;cursor:pointer;
            transition:transform .18s,box-shadow .18s,background .18s;
            -webkit-tap-highlight-color:transparent;
        }
        .btn:active{transform:scale(.96)!important}
        .btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 18px rgba(211,84,0,.35)}
        .btn-primary:hover{background:var(--primary-light);box-shadow:0 6px 24px rgba(211,84,0,.45);transform:translateY(-2px)}
        .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
        .btn-outline:hover{background:var(--primary);color:#fff;transform:translateY(-2px)}

        .search-wrap{display:flex;gap:.5rem;margin:1.4rem 0 .5rem}
        .search-wrap input{
            flex:1;padding:.6rem 1rem;
            border:2px solid var(--border-col);border-radius:50px;
            font-size:.9rem;outline:none;
            background:var(--input-bg);color:var(--dark);
            transition:border-color .2s;
            -webkit-appearance:none;
        }
        .search-wrap input:focus{border-color:var(--primary)}
        .search-wrap button{
            padding:.6rem 1.1rem;
            background:var(--primary);color:#fff;
            border:none;border-radius:50px;
            cursor:pointer;font-size:.95rem;
            transition:background .2s,transform .2s;
            -webkit-tap-highlight-color:transparent;
        }
        .search-wrap button:hover{background:var(--primary-light);transform:scale(1.07)}
        .search-wrap button:active{transform:scale(.95)}

        #suggestions{text-align:left;margin-bottom:.5rem}
        .sugg-item{
            display:flex;align-items:center;gap:.5rem;
            padding:.42rem .7rem;border-radius:8px;
            font-size:.88rem;cursor:pointer;
            color:var(--dark);background:transparent;
            border:none;width:100%;text-align:left;
            transition:background .13s;
            -webkit-tap-highlight-color:transparent;
        }
        .sugg-item:hover,.sugg-item:focus{background:var(--sugg-hover);outline:none}
        .sugg-item:active{background:var(--sugg-hover)}
        .sugg-item i{color:var(--primary);font-size:.95rem;flex-shrink:0}

        .error-path{
            font-size:.75rem;color:var(--path-col);
            font-family:monospace;
            background:var(--path-bg);border-radius:8px;
            padding:.35rem .7rem;display:inline-block;
            margin-top:1rem;word-break:break-all;
        }

        .dot{
            position:fixed;width:10px;height:10px;border-radius:50%;
            animation:dotFall linear infinite;pointer-events:none;opacity:.7;
            will-change:transform;
        }
        @keyframes dotFall{
            0% {transform:translateY(-20px) rotate(0deg);opacity:1}
            100%{transform:translateY(110vh) rotate(720deg);opacity:0}
        }

        @media(max-width:480px){
            .error-card{padding:2rem 1.4rem;border-radius:20px}
            .error-title{font-size:1.25rem}
            .btn{padding:.58rem 1.1rem;font-size:.85rem}
        }

        @media(prefers-reduced-motion:reduce){
            .particle,.dot{animation:none!important;opacity:0!important}
            .error-number,.error-emoji{animation:none!important}
            .error-card{animation:none!important}
        }
    </style>
</head>
<body>
    <div class="error-card">
        <span class="error-number" id="errCodigo">{{ codigo | default(404) }}</span>
        <span class="error-emoji" id="errEmoji">🍩</span>

        <div class="offline-banner" id="offlineBanner">
            <i class="bi bi-wifi-off"></i>
            <span>Sin conexión a internet — revisá tu red e intentá de nuevo</span>
        </div>

        <h1 class="error-title" id="errTitulo">Cargando…</h1>
        <p class="error-desc" id="errDesc"></p>

        <div class="search-wrap">
            <input type="text" id="searchQ" placeholder="Buscar módulo…"
                   oninput="filtrarSugg(this.value)"
                   onkeydown="if(event.key==='Enter')irAlBuscar()">
            <button onclick="irAlBuscar()" title="Buscar"><i class="bi bi-search"></i></button>
        </div>
        <div id="suggestions"></div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="irA('/inicio')">
                <i class="bi bi-house-door-fill"></i> Inicio
            </button>
            <button class="btn btn-outline" onclick="irA('/catalogo_page')">
                <i class="bi bi-shop"></i> Catálogo
            </button>
            <button class="btn btn-outline" onclick="history.back()">
                <i class="bi bi-arrow-left"></i> Volver
            </button>
        </div>

        <div class="error-path" id="errPath"></div>
    </div>

    <script>
    (function(){
        const CODIGO = {{ codigo | default(404) }};

        const TIPOS = {
            404: {
                emoji: '🍩',
                titulo: '¡Ups! Página no encontrada',
                desc: 'Al parecer esta página se la comieron los postres.<br>La ruta que buscas no existe o fue movida.',
            },
            403: {
                emoji: '🔒',
                titulo: 'Acceso denegado',
                desc: 'No tenés permiso para ver esta sección.<br>Iniciá sesión con una cuenta autorizada.',
            },
            500: {
                emoji: '⚙️',
                titulo: 'Error interno del servidor',
                desc: 'Algo falló en el servidor. El equipo ya fue notificado.<br>Intentalo de nuevo en unos momentos.',
            },
            offline: {
                emoji: '📡',
                titulo: 'Sin conexión a internet',
                desc: 'No se detecta conexión. Revisá tu red Wi-Fi o datos móviles e intentá de nuevo.',
            },
        };

        const PAGES = [
            { label:'Inicio',                 url:'/inicio',                        icon:'bi-house-door-fill',   rol:null },
            { label:'Catálogo de productos',  url:'/catalogo_page',                 icon:'bi-shop',              rol:null },
            { label:'Mi carrito',             url:'/carrito_page',                  icon:'bi-cart3',             rol:null },
            { label:'Mi perfil',              url:'/mi_perfil',                     icon:'bi-person-circle',     rol:null },
            { label:'Sugerencias',            url:'/comentarios_page',              icon:'bi-chat-dots',         rol:null },
            { label:'Historial de facturas',  url:'/historial_facturas_page',       icon:'bi-receipt',           rol:null },
            { label:'Zona de pagos',          url:'/zona_pagos',                    icon:'bi-credit-card',       rol:null },
            { label:'Mensajes privados',      url:'/mensajes_privados',             icon:'bi-envelope-fill',     rol:null },
            { label:'Iniciar sesión',         url:'/login',                         icon:'bi-box-arrow-in-right',rol:null },
            { label:'Registrarme',            url:'/registro',                      icon:'bi-person-plus',       rol:null },
            { label:'Gestión de productos',   url:'/gestion_productos_page',        icon:'bi-box-seam',          rol:'vendedor' },
            { label:'Publicidad',             url:'/publicidad_page',               icon:'bi-megaphone',         rol:'vendedor' },
            { label:'Gestión de usuarios',    url:'/gestion_usuarios_page',         icon:'bi-people-fill',       rol:'admin' },
        ];

        function aplicarTipo(tipo) {
            const t = TIPOS[tipo] || TIPOS[404];
            document.getElementById('errEmoji').textContent = t.emoji;
            document.getElementById('errEmoji').className = 'error-emoji' + (tipo === 'offline' ? ' sin-internet' : '');
            document.getElementById('errTitulo').textContent = t.titulo;
            document.getElementById('errDesc').innerHTML = t.desc;
        }

        function actualizarOffline(offline) {
            const banner = document.getElementById('offlineBanner');
            if (offline) {
                banner.classList.add('visible');
                aplicarTipo('offline');
                document.getElementById('errCodigo').textContent = '!';
            } else {
                banner.classList.remove('visible');
                aplicarTipo(CODIGO);
                document.getElementById('errCodigo').textContent = CODIGO;
            }
        }

        aplicarTipo(navigator.onLine ? CODIGO : 'offline');
        actualizarOffline(!navigator.onLine);

        window.addEventListener('offline', () => actualizarOffline(true));
        window.addEventListener('online',  () => actualizarOffline(false));

        const p = document.getElementById('errPath');
        if (p) p.textContent = '📍 ' + location.pathname;

        const th = localStorage.getItem('dantojitos_theme') || 'light';
        document.documentElement.setAttribute('data-theme', th);

        const foods = ['🍩','🧁','🍰','🍫','🍪','🍭','🍬','🍮','🎂','🥐','🍓','🍑'];
        for (let i = 0; i < 12; i++) {
            const el = document.createElement('div');
            el.className = 'particle';
            el.textContent = foods[i % foods.length];
            el.style.cssText = `left:${Math.random()*100}vw;animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*8}s;font-size:${1.2+Math.random()*1.5}rem`;
            document.body.appendChild(el);
        }

        const colors = ['#d35400','#e67e22','#f39c12','#27ae60','#3498db','#9b59b6','#e74c3c'];
        for (let i = 0; i < 18; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            const sz = (6 + Math.random() * 10) + 'px';
            d.style.cssText = `left:${Math.random()*100}vw;background:${colors[i%colors.length]};width:${sz};height:${sz};animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*10}s`;
            document.body.appendChild(d);
        }

        window.irA = function(url) {
            window.location.href = url;
        };

        window.filtrarSugg = function(q) {
            const box = document.getElementById('suggestions');
            if (!q.trim()) { box.innerHTML = ''; return; }
            const res = PAGES.filter(p => p.label.toLowerCase().includes(q.toLowerCase())).slice(0, 5);
            box.innerHTML = res.map(p => `<button class="sugg-item" onclick="irA('${p.url}')"><i class="bi ${p.icon}"></i>${p.label}</button>`).join('');
        };

        window.irAlBuscar = function() {
            const q = document.getElementById('searchQ').value.trim();
            if (!q) return;
            const match = PAGES.find(p => p.label.toLowerCase().includes(q.toLowerCase()));
            if (match) irA(match.url);
        };
    })();
    </script>
</body>
</html>
