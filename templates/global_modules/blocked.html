<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .blocked-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            color: #fff;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .blocked-card {
            text-align: center;
            border: 1px solid #222;
            padding: 3.5rem 2rem;
            border-radius: 28px;
            background: #080808;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            max-width: 420px;
            width: 90%;
            border-top: 1px solid #333;
        }

        .icon-lock {
            font-size: 5.5rem;
            color: #ff4757;
            display: block;
            margin-bottom: 1.5rem;
            animation: pulse-red 2s infinite;
            filter: drop-shadow(0 0 15px rgba(255, 71, 87, 0.3));
        }

        .blocked-title {
            font-weight: 850;
            letter-spacing: -1.5px;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            font-size: 1.75rem;
        }

        .blocked-text {
            color: #888;
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.4;
        }

        .spinner-size {
            width: 2.2rem;
            height: 2.2rem;
            border-width: 0.2em;
            margin-bottom: 1rem;
        }

        .redirect-info {
            color: #444;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: block;
        }

        .btn-return {
            border-radius: 14px;
            padding: 12px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            background-color: #ff4757;
            border: none;
        }

        .btn-return:hover {
            background-color: #ff6b81;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="blocked-screen">
        <div class="blocked-card">
            <i class="bi bi-shield-lock-fill icon-lock"></i>
            
            <h2 class="blocked-title">Acceso Denegado</h2>
            <p class="blocked-text">Tu cuenta no tiene los permisos necesarios para visualizar este contenido.</p>
            
            <div class="spinner-border text-danger spinner-size" role="status"></div>
            
            <span class="redirect-info"><i>Redirigiendo automáticamente...</i></span>
            
            <div class="mt-4">
                <button onclick="window.location.href='/inicio'" class="btn btn-danger w-100 fw-bold btn-return">
                    VOLVER AL PANEL DE CONTROL
                </button>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = "/inicio";
        }, 1000);
    </script>

</body>
</html>
