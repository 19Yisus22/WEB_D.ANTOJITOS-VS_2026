<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido | D'Antojitos©</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_blocked.css') }}">
</head>
<body>

    <div class="blocked-screen">
        <div class="blocked-card">
            {% if login_required %}
            <i class="bi bi-person-lock icon-lock" style="color:#d35400;"></i>
            <h2 class="blocked-title">Acceso Restringido</h2>
            <p class="blocked-text">Debes iniciar sesión para acceder a este módulo.</p>
            <div class="spinner-border spinner-size" role="status" style="color:#d35400;"></div>
            <span class="redirect-info"><i>Redirigiendo al inicio de sesión...</i></span>
            <div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
                <button onclick="window.location.href='/login'" class="btn btn-danger fw-bold btn-return px-4">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                </button>
                <button onclick="window.location.href='/inicio'" class="btn btn-outline-secondary fw-bold px-4">
                    <i class="bi bi-house me-2"></i>Ir al Inicio
                </button>
            </div>
            <script>setTimeout(() => { window.location.href = "/login"; }, 3000);</script>
            {% else %}
            <i class="bi bi-shield-lock-fill icon-lock"></i>
            <h2 class="blocked-title">Acceso Denegado</h2>
            <p class="blocked-text">Tu cuenta no tiene los permisos necesarios para visualizar este contenido.</p>
            <div class="spinner-border text-danger spinner-size" role="status"></div>
            <span class="redirect-info"><i>Redirigiendo automáticamente...</i></span>
            <div class="mt-4">
                <button onclick="window.location.href='/inicio'" class="btn btn-danger w-100 fw-bold btn-return">
                    VOLVER AL PANEL DE CONTROL
                </button>
            </div>
            <script>setTimeout(() => { window.location.href = "/inicio"; }, 3000);</script>
            {% endif %}
        </div>
    </div>

</body>
</html>
