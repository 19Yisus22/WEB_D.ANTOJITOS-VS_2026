<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Login | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_login.css') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="toastContainer" class="position-fixed bottom-0 start-0 p-3" style="z-index: 1080;"></div>

    <div class="login-wrapper">

        <div class="login-panel-left">
            <div class="brand-block">
                <div class="brand-logo-wrap">
                    <img src="{{ url_for('static', filename='uploads/logo.ico') }}" alt="Logo D'Antojitos" class="brand-logo floating">
                </div>
                <h1 class="brand-name">D'Antojitos</h1>
                <p class="brand-tagline">Tu dulce rincón favorito</p>
                <div class="brand-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div class="left-deco deco-circle-1"></div>
            <div class="left-deco deco-circle-2"></div>
        </div>

        <div class="login-panel-right">
            <div class="login-form-container">

                <div class="form-header">
                    <h3 class="form-title">Iniciar Sesión</h3>
                    <p class="form-subtitle">Ingresa tus credenciales para continuar</p>
                </div>

                <div id="buttonDiv" class="google-btn-wrap"></div>

                <div class="divider">
                    <span>o usa tu correo</span>
                </div>

                <form id="loginForm" novalidate autocomplete="off">
                    <div class="field-group">
                        <label for="correo" class="field-label">Correo Electrónico</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-envelope field-icon-left"></i>
                            <input type="email" id="correo" name="correo" class="field-input" placeholder="usuario@example.com" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="contrasena" class="field-label">Contraseña</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-lock field-icon-left"></i>
                            <input type="password" id="contrasena" name="contrasena" class="field-input has-right-icon" placeholder="Tu contraseña" required>
                            <i class="bi bi-eye field-icon-right toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <button type="submit" id="btnSubmitLogin" class="btn-main">
                        <span>Entrar</span>
                        <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="form-footer">
                    <p class="mb-2 small">¿No tienes cuenta? <a href="/registro" class="link-highlight">Regístrate aquí</a></p>
                    <a href="/inicio" class="link-back">
                        <i class="bi bi-house-door me-1"></i>Volver al Inicio
                    </a>
                </div>

                <div class="legal-footer">
                    <a href="/politicas_page" class="legal-link">Políticas de Privacidad</a>
                    <span class="legal-dot">•</span>
                    <a href="/condiciones_page" class="legal-link">Términos y Condiciones</a>
                </div>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/general_js/login_registro.js') }}"></script>
</body>
</html>
