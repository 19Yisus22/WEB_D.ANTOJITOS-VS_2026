<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Registro | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_registro.css') }}">
</head>

<body>
    <div id="toastContainer" class="position-fixed bottom-0 start-0 p-3" style="z-index: 1080;"></div>

    <div class="registro-wrapper">
        <div class="card-registro">

            <div class="registro-header">
                <div class="logo-wrap">
                    <img src="{{ url_for('static', filename='uploads/logo.ico') }}" alt="Logo D'Antojitos" class="registro-logo floating">
                </div>
                <h2>Crear Cuenta</h2>
                <p class="registro-subtitle">Únete a nuestra dulce comunidad</p>
            </div>

            <form id="registerForm" autocomplete="off">

                <div class="fields-grid">

                    <div class="field-group">
                        <label for="nombre" class="field-label">Nombre</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-person field-icon-left"></i>
                            <input type="text" id="nombre" name="nombre" class="field-input" required placeholder="Su nombre" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+" inputmode="text" autocomplete="given-name">
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="apellido" class="field-label">Apellido</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-person-fill field-icon-left"></i>
                            <input type="text" id="apellido" name="apellido" class="field-input" required placeholder="Su apellido" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+" inputmode="text" autocomplete="family-name">
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="cedula" class="field-label">Cédula</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-card-text field-icon-left"></i>
                            <input type="text" id="cedula" name="cedula" class="field-input" required placeholder="Solo números" pattern="\d{6,}" inputmode="numeric" minlength="6">
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="telefono" class="field-label">Teléfono</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-telephone field-icon-left"></i>
                            <input type="tel" id="telefono" name="telefono" class="field-input" placeholder="Solo números" pattern="\d{10,}" inputmode="tel" minlength="10">
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="correo" class="field-label">Correo Electrónico</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-envelope field-icon-left"></i>
                            <input type="email" id="correo" name="correo" class="field-input" required placeholder="usuario@example.com">
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="contrasena" class="field-label">Contraseña</label>
                        <div class="field-input-wrap">
                            <i class="bi bi-lock field-icon-left"></i>
                            <input type="password" id="contrasena" name="contrasena" class="field-input has-right-icon" required placeholder="Ingrese contraseña">
                            <i class="bi bi-eye field-icon-right" id="togglePassword" style="cursor:pointer;"></i>
                        </div>
                        <div class="strength-bar-wrap">
                            <div class="strength-bar">
                                <div id="passwordStrengthBar" class="strength-fill"></div>
                            </div>
                            <span id="strengthLabel" class="strength-label"></span>
                        </div>
                    </div>

                </div>

                <button type="submit" id="btnSubmit" class="btn-gradient">
                    <span>Crear Cuenta</span>
                    <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </form>

            <p class="registro-footer-text">
                ¿Ya tienes cuenta? <a href="/login" class="link-highlight">Inicia sesión aquí</a>
            </p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/general_js/login_registro.js') }}"></script>
</body>
</html>
