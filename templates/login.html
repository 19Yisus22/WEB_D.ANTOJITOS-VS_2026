{% extends 'base.html' %}
{% block title %}Iniciar sesión · DermaIAInsight{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}
{% block content %}
<div class="login-wrapper">
    <div class="login-card p-4 p-md-5">
        <div class="text-center mb-4">
            <div class="login-logo">
                <i class="fas fa-microscope"></i>
            </div>
            <h1 class="login-title">DermaIAInsight</h1>
            <p class="login-subtitle mt-1">Ingresa tu cédula y contraseña para continuar</p>
        </div>

        <form method="post" action="{{ url_for('login') }}" id="form-login" novalidate>
            <div class="mb-3">
                <label class="form-label" for="login-cedula">Cédula</label>
                <input class="form-control" type="text" id="login-cedula" name="cedula"
                       placeholder="Número de cédula registrado" autocomplete="username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label" for="login-contrasena">Contraseña</label>
                <input class="form-control" type="password" id="login-contrasena" name="contrasena"
                       placeholder="Contraseña de acceso" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión
            </button>
        </form>

        <div class="login-divider my-4">o</div>

        <div class="text-center">
            <p class="mb-0" style="font-size:.88rem; color:#64748b;">
                ¿No tienes cuenta?
                <a href="{{ url_for('registro') }}" class="login-link ms-1">Regístrate aquí</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
