<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modules/style_utils.css') }}">
    <style>
        body { background: linear-gradient(135deg, #fff8f0 0%, #ffe8d6 100%); }
        .card-title-marketing {
            background: linear-gradient(135deg, #d35400 0%, #e67e22 100%);
            color: white; padding: 2.2rem 2rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(211,84,0,0.22);
            position: relative; overflow: hidden; margin-bottom: 1.5rem;
        }
        .card-title-marketing::before {
            content:''; position:absolute; top:-60%; left:-10%;
            width:260px; height:260px; background:rgba(255,255,255,0.06); border-radius:50%;
        }
        .card-title-marketing::after {
            content:''; position:absolute; bottom:-40%; right:-5%;
            width:200px; height:200px; background:rgba(255,255,255,0.04); border-radius:50%;
        }
        .user-avatar { width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--theme-border); }
        .user-avatar-broken { width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
            justify-content:center;background:#f0f0f0;color:#adb5bd;font-size:1.2rem;border:2px solid #dee2e6; }
        .role-badge  { font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px; }
        .role-admin   { background:#fff3cd;color:#856404; }
        .role-vendedor{ background:#cfe2ff;color:#084298; }
        .role-cliente { background:#d1e7dd;color:#0a3622; }
        .method-google{ background:#fce8e6;color:#d32f2f; }
        .method-email { background:#e8f4fd;color:#0277bd; }
        .search-bar   { max-width:400px; }
        .user-row     { transition:background 0.15s, box-shadow 0.15s; cursor:default; }
        .user-row:hover { background:rgba(211,84,0,0.04) !important; box-shadow: inset 3px 0 0 #d35400; }
        .action-btn   { padding:4px 10px;border-radius:8px;font-size:0.78rem;font-weight:600; }
        [data-theme="dark"] .role-admin    { background:#332900;color:#ffc107; }
        [data-theme="dark"] .role-vendedor { background:#001133;color:#90caf9; }
        [data-theme="dark"] .role-cliente  { background:#002211;color:#81c784; }
        [data-theme="dark"] .method-google { background:#330000;color:#ef9a9a; }
        [data-theme="dark"] .method-email  { background:#001a33;color:#4fc3f7; }
        .stats-grid   { display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:28px; }
        .stat-box     { background:var(--theme-card);border:1px solid var(--theme-border);border-radius:14px;
            padding:18px 16px;text-align:center;transition:transform 0.2s, box-shadow 0.2s; }
        .stat-box:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(211,84,0,0.12); }
        .stat-box .num{ font-size:1.8rem;font-weight:800;color:var(--theme-link); }
        .stat-box .lbl{ font-size:0.78rem;color:var(--theme-text-muted);text-transform:uppercase;letter-spacing:0.5px; }
        /* Sortable table */
        .sortable-col { cursor:pointer; user-select:none; white-space:nowrap; }
        .sortable-col:hover { color: #d35400; }
        .sort-icon { font-size:0.65rem; margin-left:4px; opacity:0.5; }
        .sort-asc .sort-icon, .sort-desc .sort-icon { opacity:1; color:#d35400; }
        .table-card { border-radius:16px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.07); }
        .table thead th { background: #1a1a1a; color:#fff; border:none; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.6px; }
        .table-striped > tbody > tr:nth-of-type(odd) > * { background-color: rgba(211,84,0,0.02); }
        .badge-online { width:8px;height:8px;border-radius:50%;background:#27ae60;display:inline-block; }
    </style>
</head>
<body>
    {% include 'global_modules/navbar.html' %}
    <main class="container py-4 page-wrapper">

        <div class="card-title-marketing mb-4 text-center">
            <h3 class="fw-bold m-0" style="position:relative;z-index:1;">
                <i class="bi bi-people-fill me-2"></i> Panel de Usuarios</h3>
            <p class="text-white-50 mb-0 mt-1 small" style="position:relative;z-index:1;">
                Administra todos los usuarios registrados en D'Antojitos.</p>
        </div>

        <div class="d-flex align-items-center justify-content-end mb-3">
            <button class="btn btn-outline-secondary btn-sm" onclick="cargarUsuarios()">
                <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
            </button>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-box"><div class="num" id="statTotal">-</div><div class="lbl">Total</div></div>
            <div class="stat-box"><div class="num" id="statAdmins">-</div><div class="lbl">Admins</div></div>
            <div class="stat-box"><div class="num" id="statVendedores">-</div><div class="lbl">Vendedores</div></div>
            <div class="stat-box"><div class="num" id="statClientes">-</div><div class="lbl">Clientes</div></div>
            <div class="stat-box"><div class="num" id="statGoogle">-</div><div class="lbl">Google</div></div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-3">
                <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
                    <div class="input-group search-bar">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" id="buscarUsuario" class="form-control"
                               placeholder="Nombre, correo o cédula..." oninput="filtrarUsuarios()">
                    </div>
                    <select id="filtroRol" class="form-select" style="max-width:150px;" onchange="filtrarUsuarios()">
                        <option value="">Todos los roles</option>
                        <option value="admin">Admin</option>
                        <option value="vendedor">Vendedor</option>
                        <option value="cliente">Cliente</option>
                    </select>
                    <select id="filtroAuth" class="form-select" style="max-width:160px;" onchange="filtrarUsuarios()">
                        <option value="">Todos los métodos</option>
                        <option value="google">Google</option>
                        <option value="email">Correo</option>
                    </select>
                </div>

                <div class="table-responsive table-card">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead>
                            <tr>
                                <th style="width:48px;"></th>
                                <th class="sortable-col" onclick="sortTabla('nombre_completo')">
                                    Usuario <i class="bi bi-chevron-expand sort-icon" id="sort-nombre_completo"></i>
                                </th>
                                <th class="sortable-col" onclick="sortTabla('cedula')">
                                    Cédula <i class="bi bi-chevron-expand sort-icon" id="sort-cedula"></i>
                                </th>
                                <th>Correo</th>
                                <th class="sortable-col" onclick="sortTabla('rol')">
                                    Rol <i class="bi bi-chevron-expand sort-icon" id="sort-rol"></i>
                                </th>
                                <th>Método</th>
                                <th class="sortable-col" onclick="sortTabla('fecha_creacion')">
                                    Registro <i class="bi bi-chevron-expand sort-icon" id="sort-fecha_creacion"></i>
                                </th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaUsuarios">
                            <tr>
                                <td colspan="8" class="text-center py-5">
                                    <div class="spinner-border spinner-border-sm me-2" style="color:#d35400;"></div>
                                    Cargando usuarios...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-2 text-muted small" id="conteoResultados"></div>
            </div>
        </div>

    </main>

    <div id="toastContainer"></div>
    {% include 'global_modules/footer.html' %}
    <button id="scrollToTopBtn" title="Volver arriba"><i class="bi bi-arrow-up"></i></button>

    <div class="modal fade" id="modalRol" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold">Cambiar Rol</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-2" id="modalRolNombre"></p>
                    <select id="selectNuevoRol" class="form-select">
                        <option value="cliente">Cliente</option>
                        <option value="vendedor">Vendedor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary btn-sm" id="btnGuardarRol">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/global_js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global_js/i18n.js') }}"></script>
    <script>
    let _usuarios = [];
    let _cedula_modal = null;
    let _sortCol = '';
    let _sortAsc = true;
    const _modal_rol = new bootstrap.Modal(document.getElementById('modalRol'));

    const ROLES_CLASS = { admin:'role-admin', vendedor:'role-vendedor', cliente:'role-cliente', visitante:'role-cliente' };

    function _fecha(iso) {
        if (!iso) return '-';
        try { return new Date(iso).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' }); } catch { return '-'; }
    }

    async function cargarUsuarios() {
        try {
            const res  = await fetch('/listar_usuarios');
            _usuarios  = await res.json();
            _actualizarStats();
            filtrarUsuarios();
        } catch { mostrarAlerta('Error al cargar usuarios', true); }
    }

    function _actualizarStats() {
        document.getElementById('statTotal').textContent     = _usuarios.length;
        document.getElementById('statAdmins').textContent    = _usuarios.filter(u => u.rol === 'admin').length;
        document.getElementById('statVendedores').textContent= _usuarios.filter(u => u.rol === 'vendedor').length;
        document.getElementById('statClientes').textContent  = _usuarios.filter(u => u.rol === 'cliente').length;
        document.getElementById('statGoogle').textContent    = _usuarios.filter(u => u.auth_method === 'google').length;
    }

    function filtrarUsuarios() {
        const q    = (document.getElementById('buscarUsuario').value || '').toLowerCase();
        const rol  = document.getElementById('filtroRol').value;
        const auth = document.getElementById('filtroAuth').value;

        const filtrados = _usuarios.filter(u => {
            const texto = `${u.nombre_completo} ${u.correo} ${u.cedula}`.toLowerCase();
            const okQ   = !q   || texto.includes(q);
            const okRol = !rol || u.rol === rol;
            const okAuth= !auth|| u.auth_method === auth;
            return okQ && okRol && okAuth;
        });

        _renderTabla(filtrados);
        document.getElementById('conteoResultados').textContent =
            `Mostrando ${filtrados.length} de ${_usuarios.length} usuarios`;
    }

    function sortTabla(col) {
        if (_sortCol === col) { _sortAsc = !_sortAsc; }
        else { _sortCol = col; _sortAsc = true; }
        document.querySelectorAll('.sort-icon').forEach(el => {
            el.className = 'bi bi-chevron-expand sort-icon';
            el.closest('.sortable-col')?.classList.remove('sort-asc','sort-desc');
        });
        const iconEl = document.getElementById('sort-' + col);
        if (iconEl) {
            iconEl.className = `bi bi-chevron-${_sortAsc ? 'up' : 'down'} sort-icon`;
            iconEl.closest('.sortable-col')?.classList.add(_sortAsc ? 'sort-asc' : 'sort-desc');
        }
        filtrarUsuarios();
    }

    function _avatarHTML(u) {
        if (u.imagen_url) {
            return `<img src="${u.imagen_url}" class="user-avatar"
                        onerror="this.outerHTML='<div class=\\'user-avatar-broken\\'><i class=\\'bi bi-image-slash\\'></i></div>'">`;
        }
        return `<div class="user-avatar-broken"><i class="bi bi-person-fill"></i></div>`;
    }

    function _renderTabla(lista) {
        const tbody = document.getElementById('tablaUsuarios');
        if (!lista.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted"><i class="bi bi-search display-6 d-block mb-2"></i>Sin resultados</td></tr>';
            return;
        }
        let ordenada = [...lista];
        if (_sortCol) {
            ordenada.sort((a,b) => {
                const va = (a[_sortCol] || '').toString().toLowerCase();
                const vb = (b[_sortCol] || '').toString().toLowerCase();
                return _sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
            });
        }
        tbody.innerHTML = '';
        ordenada.forEach(u => {
            const tr = document.createElement('tr');
            tr.className = 'user-row';
            tr.innerHTML = `
                <td>${_avatarHTML(u)}</td>
                <td>
                    <div class="fw-semibold" style="font-size:0.9rem;">${u.nombre_completo || '-'}</div>
                    ${u.username ? `<small class="text-muted">@${u.username}</small>` : ''}
                </td>
                <td><small class="text-muted">${u.cedula || '-'}</small></td>
                <td>
                    <div class="d-flex align-items-center gap-1">
                        <small>${u.correo || '-'}</small>
                        <button class="btn btn-sm p-0 border-0 text-muted ms-1 btn-copiar-correo" title="Copiar correo" data-correo="${u.correo || ''}">
                            <i class="bi bi-clipboard" style="font-size:0.75rem;"></i>
                        </button>
                    </div>
                </td>
                <td><span class="role-badge ${ROLES_CLASS[u.rol] || 'role-cliente'}">${u.rol || 'cliente'}</span></td>
                <td>
                    <span class="role-badge ${u.auth_method === 'google' ? 'method-google' : 'method-email'}">
                        <i class="bi bi-${u.auth_method === 'google' ? 'google' : 'envelope-fill'} me-1"></i>
                        ${u.auth_method === 'google' ? 'Google' : 'Correo'}
                    </span>
                </td>
                <td><small class="text-muted">${_fecha(u.fecha_creacion)}</small></td>
                <td class="text-center">
                    <div class="d-flex gap-1 justify-content-center">
                        <button class="btn btn-outline-secondary action-btn btn-ver-usuario" title="Ver detalles" data-idx="${_usuarios.indexOf(u)}">
                            <i class="bi bi-eye"></i>
                        </button>
                        <button class="btn btn-outline-primary action-btn"
                                onclick="abrirModalRol('${u.cedula}','${u.nombre_completo}','${u.rol}')"
                                title="Cambiar rol">
                            <i class="bi bi-shield-lock"></i>
                        </button>
                        <button class="btn btn-outline-danger action-btn"
                                onclick="eliminarUsuario('${u.correo}','${u.nombre_completo}')"
                                title="Eliminar usuario">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </td>`;
            tr.querySelector('.btn-ver-usuario').onclick = () => mostrarDetalleUsuario(u);
            tr.querySelector('.btn-copiar-correo').onclick = async (e) => {
                const btn = e.currentTarget;
                const correo = btn.dataset.correo;
                try {
                    await navigator.clipboard.writeText(correo);
                    btn.innerHTML = '<i class="bi bi-clipboard-check text-success" style="font-size:0.75rem;"></i>';
                    setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard" style="font-size:0.75rem;"></i>'; }, 2000);
                    mostrarAlerta('Correo copiado al portapapeles');
                } catch { mostrarAlerta('No se pudo copiar el correo', true); }
            };
            tbody.appendChild(tr);
        });
    }

    function abrirModalRol(cedula, nombre, rolActual) {
        _cedula_modal = cedula;
        document.getElementById('modalRolNombre').textContent  = nombre;
        document.getElementById('selectNuevoRol').value        = rolActual || 'cliente';
        document.getElementById('btnGuardarRol').onclick       = guardarRol;
        _modal_rol.show();
    }

    async function guardarRol() {
        const nuevoRol = document.getElementById('selectNuevoRol').value;
        try {
            const res  = await fetch('/actualizar_rol_usuario', {
                method: 'PUT',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ cedula: _cedula_modal, rol: nuevoRol })
            });
            const data = await res.json();
            if (data.ok) { mostrarAlerta('Rol actualizado'); _modal_rol.hide(); cargarUsuarios(); }
            else mostrarAlerta(data.error || 'Error', true);
        } catch { mostrarAlerta('Error de conexión', true); }
    }

    function eliminarUsuario(correo, nombre) {
        mostrarConfirmacionApp(
            'Eliminar Usuario',
            `¿Deseas eliminar permanentemente a <strong>${nombre}</strong>? Esta acción no se puede deshacer.`,
            async () => {
                try {
                    const res  = await fetch('/eliminar_usuario_admin', {
                        method: 'DELETE',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ correo })
                    });
                    const data = await res.json();
                    if (data.ok) { mostrarAlerta('Usuario eliminado'); cargarUsuarios(); }
                    else mostrarAlerta(data.error || 'Error', true);
                } catch { mostrarAlerta('Error de conexión', true); }
            }
        );
    }

    function mostrarDetalleUsuario(u) {
        const esGoogle = u.auth_method === 'google';
        const rol = u.rol || 'cliente';
        const rolClass = ROLES_CLASS[rol] || 'role-cliente';
        const fechaCreacion = u.fecha_creacion ? new Date(u.fecha_creacion).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';
        const fechaConexion = u.ultima_conexion ? new Date(u.ultima_conexion).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';
        const existing = document.getElementById('modalDetalleUsuario');
        if (existing) existing.remove();
        const modal = document.createElement('div');
        modal.id = 'modalDetalleUsuario';
        modal.className = 'modal fade';
        modal.setAttribute('tabindex', '-1');
        modal.innerHTML = `
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content border-0 shadow-lg" style="border-radius:24px;overflow:hidden;">
                    <div class="modal-header border-0 p-0" style="background:linear-gradient(135deg,#d35400,#e67e22);min-height:120px;position:relative;">
                        <div style="position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);z-index:10;">
                            <div style="position:relative;display:inline-block;">
                                <img src="${u.imagen_url || '/static/uploads/default_icon_profile.png'}"
                                     onerror="this.src='/static/uploads/default_icon_profile.png'"
                                     class="rounded-circle border border-4 border-white shadow-lg"
                                     style="width:100px;height:100px;object-fit:cover;">
                                <span class="position-absolute bottom-0 end-0 rounded-circle bg-white d-flex align-items-center justify-content-center shadow" style="width:32px;height:32px;">
                                    ${esGoogle
                                        ? '<img src="/static/uploads/googlogo.ico" style="width:18px;height:18px;">'
                                        : '<i class="bi bi-envelope-fill text-primary"></i>'}
                                </span>
                            </div>
                        </div>
                        <button type="button" class="btn-close btn-close-white m-3 ms-auto" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body px-4 pt-5 pb-3 text-center" style="margin-top:50px;">
                        <h4 class="fw-bold mb-0">${u.nombre_completo || '-'}</h4>
                        ${u.username ? `<p class="text-muted small mb-1">@${u.username}</p>` : ''}
                        <div class="d-flex justify-content-center gap-2 mt-2 mb-4">
                            <span class="role-badge ${rolClass}">${rol}</span>
                            <span class="role-badge ${esGoogle ? 'method-google' : 'method-email'}">
                                <i class="bi bi-${esGoogle ? 'google' : 'envelope-fill'} me-1"></i>
                                ${esGoogle ? 'Google' : 'Correo'}
                            </span>
                        </div>
                        <div class="row g-3 text-start">
                            <div class="col-md-6">
                                <div class="p-3 rounded-3" style="background:#f8f9fa;">
                                    <div class="small text-muted fw-bold text-uppercase mb-1" style="letter-spacing:.5px;">Cédula / ID</div>
                                    <div class="fw-semibold d-flex align-items-center gap-2">
                                        <i class="bi bi-card-text text-secondary"></i>
                                        ${u.cedula || 'No registrada'}
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-3 rounded-3" style="background:#f8f9fa;">
                                    <div class="small text-muted fw-bold text-uppercase mb-1" style="letter-spacing:.5px;">Correo</div>
                                    <div class="fw-semibold d-flex align-items-center gap-2">
                                        <i class="bi bi-envelope text-secondary"></i>
                                        <span style="word-break:break-all;font-size:.9rem;">${u.correo || '-'}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-3 rounded-3" style="background:#f8f9fa;">
                                    <div class="small text-muted fw-bold text-uppercase mb-1" style="letter-spacing:.5px;">Teléfono</div>
                                    <div class="fw-semibold d-flex align-items-center gap-2">
                                        <i class="bi bi-telephone text-secondary"></i>
                                        ${u.telefono || 'No registrado'}
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-3 rounded-3" style="background:#f8f9fa;">
                                    <div class="small text-muted fw-bold text-uppercase mb-1" style="letter-spacing:.5px;">Dirección</div>
                                    <div class="fw-semibold d-flex align-items-center gap-2">
                                        <i class="bi bi-geo-alt text-secondary"></i>
                                        <span style="font-size:.9rem;">${u.direccion || 'No registrada'}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-3 rounded-3" style="background:#fff3e0;">
                                    <div class="small text-muted fw-bold text-uppercase mb-1" style="letter-spacing:.5px;">Registro</div>
                                    <div class="d-flex align-items-center gap-2 small">
                                        <i class="bi bi-calendar-check text-warning"></i>${fechaCreacion}
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-3 rounded-3" style="background:#e8f5e9;">
                                    <div class="small text-muted fw-bold text-uppercase mb-1" style="letter-spacing:.5px;">Última Conexión</div>
                                    <div class="d-flex align-items-center gap-2 small">
                                        <i class="bi bi-clock-history text-success"></i>${fechaConexion}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 px-4 pb-4 pt-2 d-flex gap-2">
                        <button class="btn btn-outline-primary flex-fill fw-bold"
                                onclick="navigator.clipboard.writeText('${u.correo||''}').then(()=>mostrarAlerta('Correo copiado'))">
                            <i class="bi bi-clipboard me-1"></i>Copiar Correo
                        </button>
                        <button class="btn btn-outline-warning flex-fill fw-bold"
                                onclick="abrirModalRol('${u.cedula}','${u.nombre_completo}','${u.rol}');bootstrap.Modal.getInstance(document.getElementById('modalDetalleUsuario'))?.hide()">
                            <i class="bi bi-shield-lock me-1"></i>Cambiar Rol
                        </button>
                        <button type="button" class="btn btn-dark flex-fill fw-bold" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>`;
        document.body.appendChild(modal);
        new bootstrap.Modal(modal).show();
        modal.addEventListener('hidden.bs.modal', () => modal.remove());
    }

    document.addEventListener('DOMContentLoaded', cargarUsuarios);
    </script>
</body>
</html>
