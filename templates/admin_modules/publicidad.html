<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Gestión de Publicidad | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_publicidad.css') }}">
</head>
<body>
    
    {% include 'global_modules/navbar.html' %}

    <div class="main-content">
        <div class="container-central">
            <div class="card-title-marketing mb-4 text-center">
                <h3 class="display-6 fw-bold m-0"><i class="bi bi-megaphone"></i> Panel de Publicidad</h3>
                <p class="text-white-50 mb-0">GESTIONA TUS PUBLICIDADES</p>
            </div>

            <div class="card section-notificaciones shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <i class="bi bi-bell-fill fs-4 text-warning"></i>
                        <h4 class="m-0 fw-bold">Sistema de Alertas</h4>
                    </div>
                    <div class="row g-3">
                        <div class="col-12 col-lg-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Subir Imagen (Opcional)</label>
                            <div id="previewNotificacion" class="preview-img-box mb-3 d-flex align-items-center justify-content-center border rounded-4 bg-light overflow-hidden shadow-sm" style="height: 210px; border: 2px dashed #cbd5e0 !important; position: relative; transition: all 0.3s ease; background-color: #f8fafc !important;">
                                <div id="placeholderNotif" class="text-center text-muted">
                                    <i class="bi bi-image" style="font-size: 3.5rem; color: #cbd5e0; display: block; margin-bottom: 5px;"></i>
                                    <span class="fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px; color: #94a3b8;">Seleccionar Imagen</span>
                                </div>
                                <img id="previewNotificacionImg" src="" alt="Vista previa" class="w-100 h-100 d-none" style="object-fit: contain; background: #f8fafc;" onload="this.classList.remove('d-none'); document.getElementById('placeholderNotif').classList.add('d-none')" onerror="this.classList.add('d-none'); document.getElementById('placeholderNotif').classList.remove('d-none')">
                            </div>
                            <input type="file" id="archivoNotificacion" class="form-control shadow-none" accept="image/*" onchange="actualizarPreviewNotif(this)">
                        </div>
                        <div class="col-12 col-lg-4">
                            <label class="form-label fw-bold small">TÍTULO</label>
                            <input type="text" id="tituloNotificacion" class="form-control mb-2" placeholder="Ej: ¡Nuevo Producto!">
                            <label class="form-label fw-bold small">MENSAJE</label>
                            <textarea id="descNotificacion" class="form-control" rows="2" placeholder="Descripción..."></textarea>
                        </div>
                        <div class="col-12 col-lg-4 d-flex align-items-end">
                            <button class="btn btn-warning w-100 py-3 fw-bold shadow" onclick="crearNotificacion()">
                                <i class="bi bi-plus-circle-fill"></i> PUBLICAR ALERTA
                            </button>
                        </div>
                        <div class="col-12 mt-4">
                            <h6 class="fw-bold border-bottom pb-2 text-muted small text-uppercase">Alertas Activas</h6>
                            <div id="contenedorAlertas" class="d-flex flex-column gap-2 mt-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card section-carrusel shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <i class="bi bi-images fs-4 text-primary"></i>
                        <h4 class="m-0 fw-bold">Carruseles</h4>
                    </div>
                    <div id="carruselContainer" class="row g-3"></div>
                    <button class="btn btn-outline-primary w-100 mt-4 fw-bold" onclick="agregarCarrusel()">
                        <i class="bi bi-plus-lg"></i> AGREGAR DIAPOSITIVA
                    </button>
                </div>
            </div>

            <div class="card section-secundarias shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <i class="bi bi-grid-3x3-gap-fill fs-4" style="color: #6f42c1;"></i>
                        <h4 class="m-0 fw-bold">Tarjetas Informativas</h4>
                    </div>
                    <div id="seccionesContainer" class="row g-3"></div>
                    <button class="btn btn-outline-secondary w-100 mt-4 fw-bold" onclick="agregarSeccion()">
                        <i class="bi bi-plus-lg"></i> AGREGAR TARJETA
                    </button>
                </div>
            </div>

            <div class="card section-cinta shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <i class="bi bi-cursor-text fs-4 text-success"></i>
                        <h4 class="m-0 fw-bold">Cinta Publicitaria</h4>
                    </div>
                    <div id="cintaContainer" class="row g-3"></div>
                    <button class="btn btn-outline-success w-100 mt-4 fw-bold" onclick="agregarCinta()">
                        <i class="bi bi-plus-lg"></i> AGREGAR A LA CINTA
                    </button>
                </div>
            </div>

            <div class="sticky-bottom bg-white p-3 border-top shadow-lg rounded-4 mb-5 mx-2" style="z-index: 1000;">
                <div id="progressContainer" class="d-none mb-3">
                    <div class="progress">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                    <small class="text-muted mt-1" id="progressText">Subiendo imágenes...</small>
                </div>
                <button id="btnGuardarMarketing" class="btn btn-dark btn-lg w-100 fw-bold py-3 shadow">
                    <i class="bi bi-cloud-arrow-up-fill"></i> GUARDAR TODOS LOS CAMBIOS
                </button>
            </div>

            <div class="mb-5 pb-5">
                <div class="d-flex align-items-center justify-content-center gap-2 mb-4">
                    <i class="bi bi-eye-fill fs-4 text-muted"></i>
                    <h5 class="m-0 text-muted text-uppercase fw-bold">Previsualización de Publicidad</h5>
                </div>
                <div id="previewInicio" class="border shadow-lg overflow-hidden">
                    <div class="promo-banner bg-dark py-2 overflow-hidden gap-cinta-carrusel">
                        <div id="previewCintaMarquee" class="d-flex align-items-center"></div>
                    </div>
                    <div id="previewCarrusel" class="carousel slide" data-bs-ride="carousel">
                        <div class="carousel-inner"></div>
                    </div>
                    <div id="previewSecciones" class="row g-3 p-4 justify-content-center m-0"></div>
                </div>
            </div>
        </div>
    </div>

    {% include 'global_modules/footer.html' %}
    
    <div id="toastContainer" style="position: fixed; top: 20px; right: 20px; z-index: 11000;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/admin_js/publicidad.js') }}"></script>
</body>
</html>
