<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Gestión de Facturación | D'Antojitos©</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='uploads/logo.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_zona_pagos.css') }}">
</head>
<body>

    {% include 'global_modules/navbar.html' %}

    <div class="main-content" id="adminContent">
        <div class="container-central">

            <input type="hidden" id="metodos_iniciales_data" value='{{ metodos | tojson | safe }}'>

            <div class="card-title-marketing">
                <h3 class="display-6 fw-bold m-0">
                    <i class="bi bi-currency-exchange me-2"></i>Panel de Facturación
                </h3>
                <p class="text-white-50 mb-0 mt-1 fw-500">Configuración de canales de recaudación</p>
            </div>

            <div class="card border-0 mb-4 bg-transparent">
                <div class="storage-mini-container d-flex align-items-center justify-content-end">
                    <div class="storage-container bg-white p-2 px-3 rounded-3 shadow-sm border d-flex align-items-center" data-bs-toggle="tooltip" data-bs-placement="top" title="Clic para ver detalles del almacenamiento">
                        <div class="cloud-icon position-relative d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; cursor: pointer;" onclick="showStorageDetails()">
                            <i class="bi bi-cloud-fill text-primary" style="font-size: 1.5rem; z-index: 2;"></i>
                            <svg class="position-absolute top-0 start-0" width="48" height="48" viewBox="0 0 48 48" style="pointer-events: none;">
                                <circle cx="24" cy="24" r="20" stroke="#e9ecef" stroke-width="4" fill="none"></circle>
                                <circle id="storageCircle" cx="24" cy="24" r="20" stroke="#007bff" stroke-width="4" fill="none" stroke-dasharray="125.66" stroke-dashoffset="125.66" transform="rotate(-90 24 24)"></circle>
                            </svg>
                        </div>
                        <div class="ms-3">
                            <small class="fw-bold text-muted" style="font-size: 0.7rem;">ALMACENAMIENTO CLOUDINARY</small><br>
                            <small id="storageText" class="text-primary fw-bold" style="font-size: 0.7rem;">Cargando...</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <i class="bi bi-plus-circle-fill fs-4 text-primary"></i>
                        <h4 class="m-0 fw-bold">Nuevo Canal de Pago</h4>
                    </div>

                    <div class="row g-4">
                        <div class="col-12 col-md-4 text-center">
                            <div class="preview-qr-box mb-3">
                                <div id="placeholderQR" class="text-center text-muted">
                                    <i class="bi bi-qr-code-scan d-block mb-2" style="font-size: 2.5rem;"></i>
                                    <span class="small fw-bold text-uppercase">Subir QR</span>
                                </div>
                                <img id="previewPagoImg" src="" alt="Vista Previa" class="w-100 h-100 d-none" style="object-fit: contain;">
                            </div>
                            <input type="file" id="archivoQR" class="form-control shadow-none" accept="image/*">
                        </div>

                        <div class="col-12 col-md-4">
                            <label class="form-label">Entidad</label>
                            <select id="entidadBancaria" class="form-select mb-3">
                                <option value="Nequi">Nequi</option>
                                <option value="Daviplata">Daviplata</option>
                                <option value="Bancolombia">Bancolombia</option>
                                <option value="NuBank">NuBank</option>
                            </select>

                            <label class="form-label">Tipo</label>
                            <select id="tipoCuenta" class="form-select">
                                <option value="Billetera Digital">Billetera Digital</option>
                                <option value="Ahorros">Ahorros</option>
                                <option value="Corriente">Corriente</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-4">
                            <label class="form-label">Número</label>
                            <input type="text" id="numeroCuenta" class="form-control mb-3" placeholder="Ej: 300...">

                            <label class="form-label">Titular</label>
                            <input type="text" id="titularCuenta" class="form-control" placeholder="Nombre completo">
                        </div>

                        <div class="col-12">
                            <button id="btnAgregarTemporal" class="btn btn-primary w-100 py-3">
                                <i class="bi bi-node-plus-fill"></i> Agregar a Lista
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <i class="bi bi-list-check fs-4 text-secondary"></i>
                        <h4 class="m-0 fw-bold">Canales Listos</h4>
                    </div>
                    <div id="listaMetodosPago" class="row g-3"></div>
                </div>
            </div>

            <div class="sticky-bottom mb-5">
                <button id="btnGuardarPagos" class="btn btn-success btn-lg w-100 py-3 shadow">
                    <i class="bi bi-cloud-arrow-up-fill"></i> Guardar Cambios en Servidor
                </button>
            </div>

            <div class="mb-5 pb-4">
                <div class="text-center mb-4">
                    <span class="badge bg-secondary text-uppercase px-3 py-2">Vista Previa Factura</span>
                </div>
                <div id="facturaLayout" class="factura-mockup p-4 bg-white border rounded shadow-sm mx-auto" style="max-width: 500px;">
                    <div id="previewContenedorFinal" class="row g-3"></div>
                </div>
            </div>

        </div>
    </div>

    {% include 'global_modules/footer.html' %}

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/admin_js/metodo_pago.js') }}"></script>
</body>
</html>
